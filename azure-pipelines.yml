trigger:
- main   # or your branch name

pool:
  vmImage: 'ubuntu-latest'

steps:
# Step 1: Install Terraform
- task: TerraformInstaller@0
  inputs:
    terraformVersion: '1.5.7'

# Step 2: Terraform Init
- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
    backendServiceArm: 'devops-project'
    backendAzureRmResourceGroupName: '<Your-Backend-RG>'
    backendAzureRmStorageAccountName: '<Your-Storage-Account>'
    backendAzureRmContainerName: '<Your-Container>'
    backendAzureRmKey: 'terraform.tfstate'

# Step 3: Terraform Validate
- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'validate'
    workingDirectory: '$(System.DefaultWorkingDirectory)'

# Step 4: Terraform Plan
- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
    environmentServiceNameAzureRM: 'devops-project'
    vars: |
      -var-file=terraform.tfvars

# Step 5: Terraform Apply
- task: TerraformTaskV4@4
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
    environmentServiceNameAzureRM: 'devops-project'
    vars: |
      -var-file=terraform.tfvars
    args: '-auto-approve'
